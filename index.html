<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // Polyfills cho các dòng máy cũ (như Safari 10 / iOS 10 trên iPad 4)
      if (typeof globalThis === 'undefined') {
        window.globalThis = window;
      }
      if (!Object.values) {
        Object.values = function(obj) {
          return Object.keys(obj).map(function(key) { return obj[key]; });
        };
      }
      if (!Object.entries) {
        Object.entries = function(obj) {
          return Object.keys(obj).map(function(key) { return [key, obj[key]]; });
        };
      }
      if (!Object.fromEntries) {
        Object.fromEntries = function(entries) {
          var obj = {};
          for (var i = 0; i < entries.length; i++) {
            var entry = entries[i];
            obj[entry[0]] = entry[1];
          }
          return obj;
        };
      }
      if (!String.prototype.includes) {
        String.prototype.includes = function(search, start) {
          if (typeof start !== 'number') { start = 0; }
          if (start + search.length > this.length) { return false; }
          return this.indexOf(search, start) !== -1;
        };
      }
      if (!Array.prototype.includes) {
        Array.prototype.includes = function(searchElement, fromIndex) {
          var o = Object(this);
          var len = o.length >>> 0;
          if (len === 0) { return false; }
          var n = fromIndex | 0;
          var k = Math.max(n >= 0 ? n : len - Math.abs(n), 0);
          while (k < len) {
            if (o[k] === searchElement) { return true; }
            k++;
          }
          return false;
        };
      }
    </script>
    <title>Hệ Thống Thi Trực Tuyến - EXAM ONLINE</title>
    <meta name="description" content="Hệ thống thi trực tuyến trắc nghiệm & tự luận, tích hợp AI chấm bài tự động bằng Google Gemini" />

    <link rel="icon" type="image/x-icon" href="/logo-exam.ico" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icon (iPhone / iPad Home Screen) -->
    <link rel="apple-touch-icon" href="/logo-exam.png" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Đăng ký Service Worker + Cơ chế tự động cập nhật giao diện
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            console.log('[SW] Service Worker đã đăng ký thành công.');

            // Kiểm tra cập nhật mỗi 60 giây
            setInterval(() => {
              registration.update();
            }, 60 * 1000);

            // Khi phát hiện có SW mới đang chờ kích hoạt
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'activated') {
                    // SW mới đã kích hoạt → tải lại trang để nhận giao diện mới
                    if (navigator.serviceWorker.controller) {
                      console.log('[SW] Phiên bản mới đã sẵn sàng. Tải lại trang...');
                      window.location.reload();
                    }
                  }
                });
              }
            });
          }).catch((err) => {
            console.error('[SW] Lỗi đăng ký Service Worker:', err);
          });

          // Khi SW mới chiếm quyền điều khiển, tải lại trang
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });
        });
      }
    </script>
  </body>
</html>
